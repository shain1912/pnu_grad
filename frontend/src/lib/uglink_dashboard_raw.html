let _charts = {};
function mkChart(id, type, data, opts={}) {
  if (_charts[id]) _charts[id].destroy();
  _charts[id] = new Chart(document.getElementById(id), {type, data,
    options: {responsive:true, maintainAspectRatio:false,
              plugins:{legend:{position:'right',labels:{boxWidth:13,font:{size:11}}}},
              ...opts}});
}
function pivot(rows, keyFn, yr) {
  // keyFn(row) → category; returns {cat: count}
  const m = {};
  rows.forEach(r => {
    if (r.y !== yr) return;
    const k = keyFn(r);
    m[k] = (m[k]||0) + 1;
  });
  return m;
}
function pivotAll(rows, keyFn) {
  // returns {cat: [count per year]}
  const cats = [...new Set(rows.map(keyFn))].sort();
  const res = {};
  cats.forEach(c => res[c] = years.map(y => rows.filter(r=>r.y===y && keyFn(r)===c).length));
  return res;
}
function colorMap(keys) {
  const m = {};
  keys.forEach((k,i) => m[k] = palette[i % palette.length]);
  return m;
}

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page'+n).classList.add('active');

  if (n===1) renderPage1();
  if (n===2) renderPage2();
}

    `<div class="kpi"><div class="num">${total}</div><div class="lbl">총 신청자</div></div>
     <div class="kpi"><div class="num">${ms}</div><div class="lbl">학·석사연계</div></div>
     <div class="kpi"><div class="num">${phd}</div><div class="lbl">학·석박사통합연계</div></div>
     <div class="kpi"><div class="num">${srcU}</div><div class="lbl">신청 소속 대학 수</div></div>`;

  if (sel === 'prog') {
    document.getElementById('p1title').textContent = 'A. 연도별 프로그램별 신청자 수';
    const progs = ['학.석사연계과정','학.석박사통합 연계과정'];
    const datasets = progs.map((p,i) => ({
      label: p,
      data: years.map(y => rows.filter(r=>r.y===y && r.g===p).length),
      backgroundColor: ['#2E86AB','#E84855'][i], stack:'s'
    }));
    mkChart('chartP1','bar',{labels:years,datasets},
      {scales:{x:{stacked:true},y:{stacked:true,title:{display:true,text:'신청자 수 (명)'}}}});

  } else if (sel === 'src') {
    document.getElementById('p1title').textContent = 'B. 소속 대학별 연도별 신청자 수';
    const allCols = [...new Set(rows.map(r=>r.sd))].sort();
    const cm = colorMap(allCols);
    const datasets = allCols.map(c => ({
      label: c,
      data: years.map(y => rows.filter(r=>r.y===y && r.sd===c).length),
      backgroundColor: cm[c], stack:'s'
    }));
    mkChart('chartP1','bar',{labels:years,datasets},
      {scales:{x:{stacked:true},y:{stacked:true,title:{display:true,text:'신청자 수 (명)'}}}});

  } else { // dst - line chart top8
    document.getElementById('p1title').textContent = 'C. 진학 희망 대학별 연도별 신청자 수 추이 (상위 8개)';
    const totByDst = {};
    rows.forEach(r => totByDst[r.td] = (totByDst[r.td]||0)+1);
    const top8 = Object.entries(totByDst).sort((a,b)=>b[1]-a[1]).slice(0,8).map(e=>e[0]);
    const cm = colorMap(top8);
    const datasets = top8.map(d => ({
      label: d,
      data: years.map(y => rows.filter(r=>r.y===y && r.td===d).length),
      borderColor: cm[d], backgroundColor: cm[d]+'33',
      tension:0.3, pointRadius:5, fill:false,
    }));
    mkChart('chartP1','line',{labels:years,datasets},
      {scales:{y:{title:{display:true,text:'신청자 수 (명)'}}}});
  }
}

// ══ PAGE 2 ══════════════════════════════════════════════════════
function initPage2() {
  const sel = document.getElementById('p2col');
  colleges.forEach(c => {
    const o = document.createElement('option');
    o.value = o.textContent = c;
    sel.appendChild(o);
  });
  sel.value = '공과대학';
  onCollegeChange();
}

function onCollegeChange() {
  const col = document.getElementById('p2col').value;
  const depts = [...new Set(rows.filter(r=>r.sd===col).map(r=>r.sc))].sort();
  const dSel = document.getElementById('p2dept');
  dSel.innerHTML = '<option value="__ALL__">전체</option>';
  depts.forEach(d => {
    const o = document.createElement('option');
    o.value = o.textContent = d;
    dSel.appendChild(o);
  });
  renderPage2();
}

function renderPage2() {
  const col  = document.getElementById('p2col').value;
  const dept = document.getElementById('p2dept').value;
  const isAll = (dept === '__ALL__');

  if (isAll) {
    // X: 학부 학과별 (D:대학==col) 누적 bar
    document.getElementById('p2titleX').textContent = `[${col}] 학부 학과별 신청자 수`;
    const srcRows = rows.filter(r => r.sd === col);
    const depts = [...new Set(srcRows.map(r=>r.sc))].sort();
    const cm = colorMap(depts);
    const dsX = depts.map(d => ({
      label:d,
      data: years.map(y => srcRows.filter(r=>r.y===y && r.sc===d).length),
      backgroundColor: cm[d], stack:'s'
    }));
    mkChart('chartP2X','bar',{labels:years,datasets:dsX},{
      scales:{x:{stacked:true},y:{stacked:true,title:{display:true,text:'신청자 수 (명)'}}},
      plugins:{legend:{position:'right',labels:{boxWidth:11,font:{size:10}}}}
    });

    // Y: 대학원 학과별 (L:허가대학==col) 누적 bar
    document.getElementById('p2titleY').textContent = `[${col}] 대학원 허가학과별 신청자 수`;
    const dstRows = rows.filter(r => r.td === col);
    const hkDepts = [...new Set(dstRows.map(r=>r.tc))].sort();
    const cm2 = colorMap(hkDepts);
    const dsY = hkDepts.map(d => ({
      label:d,
      data: years.map(y => dstRows.filter(r=>r.y===y && r.tc===d).length),
      backgroundColor: cm2[d], stack:'s'
    }));
    mkChart('chartP2Y','bar',{labels:years,datasets:dsY},{
      scales:{x:{stacked:true},y:{stacked:true,title:{display:true,text:'신청자 수 (명)'}}},
      plugins:{legend:{position:'right',labels:{boxWidth:11,font:{size:10}}}}
    });

  } else {
    // X: 특정 학과 단순 bar
    document.getElementById('p2titleX').textContent = `[${col}] ${dept} 신청자 수`;
    const srcRows = rows.filter(r => r.sd===col && r.sc===dept);
    mkChart('chartP2X','bar',
      {labels:years, datasets:[{
        label: dept,
        data: years.map(y=>srcRows.filter(r=>r.y===y).length),
        backgroundColor:'#4e79a7', borderRadius:4
      }]},{
      plugins:{legend:{display:false}},
      scales:{y:{title:{display:true,text:'신청자 수 (명)'}}}
    });

    // Y: 해당 학과 학생들의 허가학과별 분포 누적 bar
    document.getElementById('p2titleY').textContent = `[${col}] ${dept} → 허가학과별 진학 분포`;
    const hkDepts = [...new Set(srcRows.map(r=>r.tc))].sort();
    const cm2 = colorMap(hkDepts);
    const dsY = hkDepts.map(d => ({
      label:d,
      data: years.map(y=>srcRows.filter(r=>r.y===y && r.tc===d).length),
      backgroundColor: cm2[d], stack:'s'
    }));
    mkChart('chartP2Y','bar',{labels:years,datasets:dsY},{
      scales:{x:{stacked:true},y:{stacked:true,title:{display:true,text:'신청자 수 (명)'}}},
      plugins:{legend:{position:'right',labels:{boxWidth:11,font:{size:10}}}}
    });
  }
}

// ── 초기화 ────────────────────────────────────────────────────────
renderPage1();
initPage2();
</script>
