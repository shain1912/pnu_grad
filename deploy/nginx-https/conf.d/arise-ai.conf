# https 테스트용: 80·443 둘 다 was로 프록시 (self-signed cert). 강제 redirect 없음(테스트 단계).
# 실인증서 적용 후엔 80→443 redirect 버전(../nginx/conf.d/arise-ai.conf)으로 교체 권장.
server {
    listen 80;
    listen [::]:80;
    server_name arise-ai.pusan.ac.kr _;
    location / {
        proxy_pass http://was:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name arise-ai.pusan.ac.kr _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # HSTS는 정식(공인) 인증서 적용 후에만 켤 것. self-signed에서 HSTS를 켜면 하드 차단됨.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;

    location / {
        proxy_pass http://was:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
