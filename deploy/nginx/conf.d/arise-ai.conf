# arise-ai.pusan.ac.kr — TLS 종단 + WAS(Express) 리버스 프록시
# 인증서: deploy/certs/{fullchain.pem, privkey.pem} (DNS-01 실인증서 또는 self-signed 플레이스홀더)

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name arise-ai.pusan.ac.kr;
    return 301 https://$host$request_uri;
}

# HTTPS 본 트래픽
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name arise-ai.pusan.ac.kr;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    # 보안 헤더 (Caddyfile에서 이식)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 2m;

    location / {
        proxy_pass http://was:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
