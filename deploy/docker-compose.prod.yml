# 최소 운영 스택 (was + postgres). SSL/리버스프록시 없이 was를 :80에 직접 노출.
# (SSL·nginx·모니터링은 사용자가 추후 추가. full 스택은 docker-compose.yml 참고)
name: pnug

services:
  was:
    image: pnug-was:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:3001"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
